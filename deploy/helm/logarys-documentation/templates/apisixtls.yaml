{{- if and .Values.apisix.enabled .Values.certificate.enabled }}
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: {{ .Values.apisix.tlsName }}
  labels:
    {{- include "logarys-documentation.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.apisix.ingressClassName }}
  hosts:
    - {{ .Values.apisix.host | quote }}
  secret:
    name: {{ .Values.certificate.secretName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
