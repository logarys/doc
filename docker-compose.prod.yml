services:
  docs:
    image: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${HARBOR_REPOSITORY}:${IMAGE_TAG:-latest}
    build:
      context: .
      args:
        VERSION: ${IMAGE_TAG:-local}
        VCS_REF: ${VCS_REF:-local}
        BUILD_DATE: ${BUILD_DATE:-local}
    container_name: logarys-documentation
    ports:
      - "${DOCS_HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
