{{- if and .Values.apisix.enabled .Values.tls.enabled .Values.tls.apisixTlsEnabled }}
apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: {{ include "logarys-documentation.fullname" . }}
  labels:
    {{- include "logarys-documentation.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.apisix.ingressClassName }}
  hosts:
    - {{ .Values.host | quote }}
  secret:
    name: {{ .Values.tls.secretName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
